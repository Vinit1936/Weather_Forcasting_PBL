<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse - Login</title>
    <meta name="description" content="Login or create your SkyPulse account.">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛅</text></svg>">
</head>

<body>
    <div class="page-transition" id="pageTransition"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scroll-progress" id="scrollProgress"></div>
    <div class="theme-transition-overlay" id="themeOverlay"></div>

    <div class="animated-bg" id="animatedBg">
        <div class="bg-gradient"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="starfield" id="starfield"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="particles" id="particles"></div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" opacity="0.3" />
                    <path d="M16 6C10.477 6 6 10.477 6 16s4.477 10 10 10 10-4.477 10-10" stroke="url(#logoGrad)"
                        stroke-width="2.5" stroke-linecap="round" />
                    <circle cx="16" cy="16" r="4" fill="currentColor" opacity="0.6" />
                    <defs>
                        <linearGradient id="logoGrad" x1="6" y1="6" x2="26" y2="26">
                            <stop stop-color="#3b82f6" />
                            <stop offset="1" stop-color="#8b5cf6" />
                        </linearGradient>
                    </defs>
                </svg>
                SkyPulse
                <span class="logo-dot"></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="travel.html">Travel</a>
                <a href="login.html" class="active">Login</a>
            </div>
            <div style="display:flex;align-items:center;gap:var(--space-md);">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" style="opacity:0;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="travel.html">Travel</a>
        <a href="login.html" class="active">Login</a>
    </div>

    <main class="page-content auth-page">
        <section class="auth-hero">
            <div class="container auth-wrap">
                <span class="section-tag reveal">Member Access</span>
                <h1 class="section-title reveal">Welcome to <span class="text-gradient">SkyPulse</span></h1>
                <p class="section-subtitle reveal">Sign in to manage saved locations and personalized weather alerts.</p>

                <div class="glass-card auth-card reveal" id="authCard">
                    <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
                        <button class="auth-tab active" id="loginTab" type="button" role="tab" aria-selected="true">Login</button>
                        <button class="auth-tab" id="registerTab" type="button" role="tab" aria-selected="false">Create Account</button>
                    </div>

                    <p class="auth-msg" id="authMessage"></p>

                    <form id="loginForm" class="auth-form" novalidate>
                        <div class="form-group">
                            <div class="input-wrapper">
                                <input type="email" id="loginEmail" class="form-input" placeholder=" " required>
                                <label for="loginEmail" class="form-label">Email Address</label>
                                <div class="input-border"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <input type="password" id="loginPassword" class="form-input" placeholder=" " required>
                                <label for="loginPassword" class="form-label">Password</label>
                                <div class="input-border"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary auth-submit" id="loginSubmitBtn">
                            <span class="auth-submit-text">Login</span>
                        </button>
                    </form>

                    <form id="registerForm" class="auth-form" novalidate style="display:none;">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <input type="text" id="registerName" class="form-input" placeholder=" " required>
                                <label for="registerName" class="form-label">Full Name</label>
                                <div class="input-border"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <input type="email" id="registerEmail" class="form-input" placeholder=" " required>
                                <label for="registerEmail" class="form-label">Email Address</label>
                                <div class="input-border"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <input type="password" id="registerPassword" class="form-input" placeholder=" " minlength="8" required>
                                <label for="registerPassword" class="form-label">Password (min 8 chars)</label>
                                <div class="input-border"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary auth-submit" id="registerSubmitBtn">
                            <span class="auth-submit-text">Create Account</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth-ui.js"></script>

    <style>
        .auth-hero {
            min-height: 100vh;
            padding: 140px var(--space-lg) var(--space-3xl);
            display: flex;
            align-items: center;
        }

        .auth-wrap {
            max-width: 640px;
            text-align: center;
        }

        .auth-card {
            margin-top: var(--space-2xl);
            padding: var(--space-2xl);
            text-align: left;
        }

        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            padding: 6px;
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
        }

        .auth-tab {
            border: 0;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 600;
            background: transparent;
            transition: all var(--speed-normal) var(--ease-out);
        }

        .auth-tab.active {
            color: var(--text-primary);
            background: var(--glass-hover-bg);
            box-shadow: var(--shadow-sm);
        }

        .auth-msg {
            min-height: 1.4rem;
            margin-bottom: var(--space-md);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .auth-msg.success {
            color: #22c55e;
        }

        .auth-msg.error {
            color: #ef4444;
        }

        .auth-form {
            display: grid;
            gap: var(--space-md);
        }

        .form-group {
            margin-bottom: var(--space-sm);
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: var(--space-lg) var(--space-md);
            padding-top: 1.6rem;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--speed-normal) var(--ease-out);
        }

        .form-label {
            position: absolute;
            left: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 0.95rem;
            pointer-events: none;
            transition: all var(--speed-normal) var(--ease-out);
        }

        .form-input:focus ~ .form-label,
        .form-input:not(:placeholder-shown) ~ .form-label {
            top: 8px;
            transform: translateY(0);
            font-size: 0.7rem;
            color: var(--accent-primary);
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-border {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent-gradient);
            transition: all var(--speed-normal) var(--ease-out);
            transform: translateX(-50%);
        }

        .form-input:focus ~ .input-border {
            width: 100%;
        }

        .auth-submit {
            margin-top: var(--space-sm);
            width: 100%;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: var(--space-lg);
            }
        }
    </style>
</body>

</html>
